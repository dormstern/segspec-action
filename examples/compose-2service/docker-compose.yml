version: "3.8"

services:
  web:
    image: example/web:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://app:app@postgres:5432/app"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
